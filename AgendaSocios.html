<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda dos sócios — Biomelting</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f3f7fb;
    --border: #dbe5ef;
    --text: #1a1a18;
    --text-muted: #5c6b78;
    --green-bg: #e1f5ee; --green-text: #085041; --green-border: #5dcaa5;
    --blue-bg: #e6f1fb;  --blue-text: #0c447c;  --blue-border: #85b7eb;
    --amber-bg: #faeeda;  --amber-text: #633806;  --amber-border: #ef9f27;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0D4E8A 0%, #1A73C8 50%, #2EC4A5 100%);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }
  .container {
    background: var(--bg);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    max-width: 560px;
    width: 100%;
    height: fit-content;
    padding: 2.5rem 1.5rem;
  }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .header img { height: 46px; width: auto; flex-shrink: 0; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin: 0; }
  .aviso {
    background: var(--amber-bg); color: var(--amber-text);
    border: 1px solid var(--amber-border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-bottom: 20px; display: none;
  }
  .painel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .painel-titulo { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .controles { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  button.dur, button.buscar {
    font-size: 13px; padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    cursor: pointer;
  }
  button.dur.active { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue-text); }
  button.buscar { background: #0D4E8A; color: #fff; border: none; margin-left: auto; }
  button.buscar:disabled { opacity: 0.5; cursor: default; }
  .resultados { display: flex; flex-direction: column; gap: 4px; }
  .grupo-label { font-size: 11px; color: var(--text-muted); margin: 10px 0 4px; }
  .grupo-label:first-child { margin-top: 0; }
  .chips { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 8px; }
  .chip {
    display: flex; flex-direction: column; gap: 3px; text-align: left;
    font-size: 13px; padding: 10px 12px; border-radius: 8px; border: 1px solid;
  }
  .chip-dia { font-weight: 600; text-transform: capitalize; }
  .chip-hora { font-size: 12px; opacity: 0.8; }
  .chip.ambos { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .chip.parcial { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .chip { cursor: pointer; transition: transform .1s; }
  .chip:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .chip-multi .chip-janela { display: block; text-decoration: underline; text-decoration-color: transparent; margin-top: 2px; }
  .chip-multi .chip-janela:hover { text-decoration-color: currentColor; }
  .mes-divisor { grid-column: 1 / -1; font-size: 11px; font-weight: 600; text-transform: capitalize; color: var(--text-muted); margin: 4px 0 -2px; }
  .mes-divisor:not(:first-child) { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .vazio { font-size: 13px; color: var(--text-muted); padding: 4px 0; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,30,40,.5); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.aberto { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 380px; width: 100%; }
  .modal h2 { font-size: 16px; font-weight: 500; margin: 0 0 8px; }
  .modal-resumo { font-size: 13px; color: var(--text-muted); margin: 0 0 16px; }
  .modal label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
  .modal input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }
  .modal-erro { color: #c0392b; font-size: 12px; min-height: 16px; margin-top: 8px; }
  .modal-botoes { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .modal-botoes button:first-child { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
</style>
</head>

  <div class="aviso" id="aviso">
    Aguardando os tokens do Calendly de Fábio e Letícia — clique em "Buscar" pra ver o estado atual.
  </div>

  <div class="painel">
    <div class="painel-titulo">Buscar horário em comum</div>
    <div class="controles">
      <button class="dur active" data-dur="30" onclick="setDuracao(30)">30 min</button>
      <button class="dur" data-dur="60" onclick="setDuracao(60)">1 hora</button>
      <button class="buscar" id="btnBuscar" onclick="buscar()">Buscar</button>
    </div>
    <div class="resultados" id="resultados">
      <div class="vazio">Clique em "Buscar" pra ver os próximos horários disponíveis (próximos 30 dias).</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="fecharModalAgendarSeClicouFora(event)">
  <div class="modal" onclick="event.stopPropagation()" id="modalCorpo"></div>
</div>

<script>
  // ATENÇÃO: substituir pela URL do Web App depois do deploy.
  // (No Apps Script: Implantar → Nova implantação → Tipo: App da Web
  //  → Executar como: Eu → Quem pode acessar: qualquer pessoa com a conta do Google)
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxSXXIU0MBUKX75ojzP6BwYib84F8T0qHA3lGKuCYFVxsKcinbOGer-qvVTur5tN4q2A/exec';

  let duracao = 30;

  function setDuracao(d) {
    duracao = d;
    document.querySelectorAll('.dur').forEach(b => b.classList.toggle('active', Number(b.dataset.dur) === d));
  }

  // O endpoint do Apps Script não devolve cabeçalho CORS pra fetch() comum,
  // então usamos JSONP (tag <script>, que não é bloqueada por CORS) em vez de fetch.
  function buscarJSONP(params) {
    return new Promise((resolve, reject) => {
      const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      const timeout = setTimeout(() => {
        limpar();
        reject(new Error('tempo esgotado ao contatar o servidor'));
      }, 15000);

      function limpar() {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
      }

      window[callbackName] = (data) => { limpar(); resolve(data); };

      const query = new URLSearchParams({ ...params, callback: callbackName }).toString();
      const script = document.createElement('script');
      script.src = `${APPS_SCRIPT_URL}?${query}`;
      script.onerror = () => { limpar(); reject(new Error('não foi possível contatar o servidor')); };
      document.body.appendChild(script);
    });
  }

  async function buscar() {
    const btn = document.getElementById('btnBuscar');
    const div = document.getElementById('resultados');
    btn.disabled = true;
    div.innerHTML = '<div class="vazio">Buscando…</div>';

    try {
      const data = await buscarJSONP({ action: 'buscar', dias: 30, duracao: duracao });

      if (!data.ok) throw new Error(data.error || 'erro desconhecido');

      atualizarAviso(data.resultado);
      renderResultados(data.resultado);
    } catch (err) {
      div.innerHTML = `<div class="vazio">Não deu pra buscar: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function atualizarAviso(r) {
    const aviso = document.getElementById('aviso');
    if (r.fabioIntegrado && r.leticiaIntegrada) {
      aviso.style.display = 'none';
      return;
    }
    if (!r.fabioIntegrado && !r.leticiaIntegrada) {
      aviso.textContent = 'Fábio e Letícia ainda não estão conectados (aguardando os tokens do Calendly dos dois). Sem dados pra mostrar por enquanto.';
    } else {
      const conectado = r.fabioIntegrado ? 'Fábio' : 'Letícia';
      const pendente = r.fabioIntegrado ? 'Letícia' : 'Fábio';
      aviso.textContent = `${pendente} ainda não está conectado(a) (aguardando o token do Calendly). Por enquanto, os resultados mostram só a disponibilidade de ${conectado}.`;
    }
    aviso.style.display = 'block';
  }

  function chipHTML(g, classe, incluirFabio, incluirLeticia) {
    const diaTexto = (g.diaSemana + ' ' + g.data).replace(/'/g, '');
    if (g.janelas.length === 1) {
      const j = g.janelas[0];
      return `<span class="chip ${classe}" onclick="abrirModalAgendar('${j.inicioISO}','${j.fimISO}','${diaTexto}',${incluirFabio},${incluirLeticia})">`
        + `<span class="chip-dia">${g.diaSemana} ${g.data}</span><span class="chip-hora">${j.horaInicio}–${j.horaFim}</span></span>`;
    }
    // dia com mais de uma janela livre (ex: manhã e tarde): cada horário
    // vira sua própria linha clicável, já que "o card inteiro" seria ambíguo.
    const linhas = g.janelas.map(j =>
      `<span class="chip-janela" onclick="event.stopPropagation();abrirModalAgendar('${j.inicioISO}','${j.fimISO}','${diaTexto}',${incluirFabio},${incluirLeticia})">${j.horaInicio}–${j.horaFim}</span>`
    ).join('');
    return `<span class="chip ${classe} chip-multi"><span class="chip-dia">${g.diaSemana} ${g.data}</span>${linhas}</span>`;
  }

  const MESES_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  function chipsComDivisorMes(grupos, classe, incluirFabio, incluirLeticia) {
    let mesAtual = null;
    let html = '';
    grupos.forEach(g => {
      const mesNum = Number(g.data.split('/')[1]) - 1;
      if (mesNum !== mesAtual) {
        html += `<div class="mes-divisor">${MESES_PT[mesNum]}</div>`;
        mesAtual = mesNum;
      }
      html += chipHTML(g, classe, incluirFabio, incluirLeticia);
    });
    return html;
  }

  function renderResultados(r) {
    const div = document.getElementById('resultados');
    let html = '';

    if (r.ambos.length) {
      html += '<div class="grupo-label">Fábio e Letícia livres</div><div class="chips">';
      html += chipsComDivisorMes(r.ambos, 'ambos', true, true);
      html += '</div>';
    }
    if (r.fabio.length) {
      html += '<div class="grupo-label">Só Fábio livre</div><div class="chips">';
      html += chipsComDivisorMes(r.fabio, 'parcial', true, false);
      html += '</div>';
    }
    if (r.leticia.length) {
      html += '<div class="grupo-label">Só Letícia livre</div><div class="chips">';
      html += chipsComDivisorMes(r.leticia, 'parcial', false, true);
      html += '</div>';
    }
    if (!html) html = '<div class="vazio">Nenhum horário livre encontrado nesse intervalo.</div>';

    div.innerHTML = html;
  }

  // ---- Agendamento: abre/fecha o modal e confirma a criação da reunião ----

  let agendamentoAtual = null;

  /**
   * Divide a janela livre clicada em opções de horário específico, do
   * tamanho da duração buscada (30/60min), avançando de 30 em 30 minutos.
   * Ex: janela 14:00–17:00 com duração de 30min vira 14:00, 14:30, ...,
   * 16:30 (a última opção que ainda cabe inteira antes das 17:00).
   */
  function gerarOpcoesHorario(inicioISO, fimISO, duracaoMin) {
    const passoMs = 30 * 60000;
    const duracaoMs = duracaoMin * 60000;
    const fimMs = +new Date(fimISO);
    const opcoes = [];
    for (let t = +new Date(inicioISO); t + duracaoMs <= fimMs; t += passoMs) {
      const ini = new Date(t);
      const term = new Date(t + duracaoMs);
      opcoes.push({ inicioISO: ini.toISOString(), fimISO: term.toISOString(), label: formatarHoraBR(ini) + '–' + formatarHoraBR(term) });
    }
    return opcoes;
  }

  /** América/São_Paulo é UTC-3 fixo (sem horário de verão desde 2019) —
   * não precisa de biblioteca de fuso, só subtrair 3h do horário UTC. */
  function formatarHoraBR(dataUTC) {
    const local = new Date(dataUTC.getTime() - 3 * 60 * 60 * 1000);
    return String(local.getUTCHours()).padStart(2, '0') + ':' + String(local.getUTCMinutes()).padStart(2, '0');
  }

  function abrirModalAgendar(inicioISO, fimISO, diaTexto, incluirFabio, incluirLeticia) {
    agendamentoAtual = { incluirFabio, incluirLeticia };
    const quem = incluirFabio && incluirLeticia ? 'Fábio e Letícia' : (incluirFabio ? 'Fábio' : 'Letícia');
    const opcoes = gerarOpcoesHorario(inicioISO, fimISO, duracao);
    const opcoesHTML = opcoes.map(o => `<option value="${o.inicioISO}|${o.fimISO}">${o.label}</option>`).join('');
    document.getElementById('modalCorpo').innerHTML = `
      <h2>Agendar reunião</h2>
      <p class="modal-resumo">${diaTexto} — ${quem}</p>
      <label for="modalHorario">Horário específico (${duracao} min)</label>
      <select id="modalHorario">${opcoesHTML}</select>
      <label for="modalNomePesquisador">Nome do pesquisador</label>
      <input type="text" id="modalNomePesquisador" placeholder="Nome e sobrenome" oninput="atualizarTituloSugerido()">
      <label for="modalPesquisadores">E-mail(s) do(s) pesquisador(es)</label>
      <input type="text" id="modalPesquisadores" placeholder="nome@instituicao.edu.br, outro@...">
      <label for="modalTitulo">Título da reunião</label>
      <input type="text" id="modalTitulo" value="Reunião Biomelting">
      <div class="modal-erro" id="modalErro"></div>
      <div class="modal-botoes">
        <button onclick="fecharModalAgendar()">Cancelar</button>
        <button class="buscar" id="btnConfirmar" onclick="confirmarAgendamento()">Confirmar agendamento</button>
      </div>`;
    document.getElementById('modalOverlay').classList.add('aberto');
  }

  /** Atualiza o título sugerido conforme o nome do pesquisador é digitado.
   * Não sobrescreve se o campo de título já tiver sido editado manualmente
   * pra algo que não segue mais o padrão "Reunião Biomelting e ..." — assim
   * uma customização manual não é apagada por engano. */
  function atualizarTituloSugerido() {
    const nome = document.getElementById('modalNomePesquisador').value.trim();
    const campoTitulo = document.getElementById('modalTitulo');
    const eraSugestao = campoTitulo.value === 'Reunião Biomelting' || /^Reunião Biomelting e /.test(campoTitulo.value);
    if (eraSugestao) {
      campoTitulo.value = nome ? `Reunião Biomelting e ${nome}` : 'Reunião Biomelting';
    }
  }

  function fecharModalAgendar() {
    document.getElementById('modalOverlay').classList.remove('aberto');
    agendamentoAtual = null;
  }

  function fecharModalAgendarSeClicouFora(ev) {
    if (ev.target.id === 'modalOverlay') fecharModalAgendar();
  }

  async function confirmarAgendamento() {
    const [horarioInicio, horarioFim] = document.getElementById('modalHorario').value.split('|');
    const pesquisadores = document.getElementById('modalPesquisadores').value.trim();
    const titulo = document.getElementById('modalTitulo').value.trim();
    const erro = document.getElementById('modalErro');
    erro.textContent = '';

    if (!pesquisadores) { erro.textContent = 'Informe pelo menos um e-mail.'; return; }

    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.textContent = 'Agendando…';

    try {
      const data = await buscarJSONP({
        action: 'agendar',
        inicio: horarioInicio,
        fim: horarioFim,
        pesquisadores: pesquisadores,
        titulo: titulo || 'Reunião Biomelting',
        incluirFabio: agendamentoAtual.incluirFabio ? '1' : '0',
        incluirLeticia: agendamentoAtual.incluirLeticia ? '1' : '0'
      });
      if (!data.ok) throw new Error(data.error || 'erro desconhecido');
      document.getElementById('modalCorpo').innerHTML = `
        <h2>Reunião agendada ✓</h2>
        <p class="modal-resumo">Convite enviado por e-mail pra: ${data.resultado.convidados.join(', ')}</p>
        <div class="modal-botoes"><button class="buscar" onclick="fecharModalAgendar()">Fechar</button></div>`;
    } catch (err) {
      erro.textContent = 'Não deu pra agendar: ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Confirmar agendamento';
    }
  }
</script>
</body>
</html>
