<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bm-blue:#0D4E8A;--bm-mid:#1A73C8;--bm-teal:#2EC4A5;--bm-light:#E6F1FB;
  --surface:#fff;--bg:#F4F7FB;--border:rgba(13,78,138,.13);
  --text:#1a2a3a;--text2:#4a6070;--text3:#8aa0b0;
  --r:10px;--r-sm:6px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.nav{display:flex;align-items:center;gap:8px;background:#fff;border-bottom:0.5px solid #E5E8EC;padding:8px 16px}
.nav span{font-size:12px;color:#888;margin-right:4px}
.nav a{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;background:#F8F9FB;border:0.5px solid #E5E8EC;font-size:12px;color:#444;text-decoration:none}
.page{padding:16px 20px;max-width:1200px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:18px;font-weight:600;color:var(--bm-blue)}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.loading{text-align:center;padding:60px;color:var(--text3);font-size:15px}

/* Metric cards */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.mc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;border-top:3px solid var(--bm-blue)}
.mc-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.mc-val{font-size:24px;font-weight:700;color:var(--bm-blue);line-height:1}
.mc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.mc.teal{border-top-color:var(--bm-teal)}.mc.teal .mc-val{color:var(--bm-teal)}
.mc.green{border-top-color:#27a85a}.mc.green .mc-val{color:#27a85a}
.mc.amber{border-top-color:#d97706}.mc.amber .mc-val{color:#d97706}
.mc.red{border-top-color:#dc2626}.mc.red .mc-val{color:#dc2626}
.mc.purple{border-top-color:#7c3aed}.mc.purple .mc-val{color:#7c3aed}

/* Charts grid */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-title i{font-size:15px;color:var(--bm-mid)}
.chart-wrap{position:relative;height:220px}

/* Funil */
.funil-row{display:grid;grid-template-columns:160px 1fr 50px 70px;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid rgba(13,78,138,.08)}
.funil-row:last-child{border-bottom:none}
.funil-label{font-size:12px;font-weight:600;color:var(--text)}
.funil-sub{font-size:10px;color:var(--text3);margin-top:1px}
.funil-bar-bg{background:#EAF4FA;border-radius:20px;height:10px;overflow:hidden}
.funil-bar{height:100%;border-radius:20px;transition:width .5s}
.funil-n{font-size:18px;font-weight:700;text-align:right}
.funil-pct{font-size:10px;color:var(--text3);text-align:right}

/* Mapa por estado */


/* Taxa de resposta */
.taxa-wrap{display:flex;align-items:center;gap:16px}
.taxa-circle{position:relative;width:100px;height:100px}
.taxa-text{font-size:13px;color:var(--text2);line-height:1.6}
.taxa-pct{font-size:28px;font-weight:700;color:var(--bm-teal)}

/* Tempo mĂ©dio */
.tempo-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.tempo-item:last-child{border-bottom:none}
.tempo-label{font-size:12px;color:var(--text2)}
.tempo-val{font-size:16px;font-weight:700;color:var(--bm-blue)}

#loading-overlay{display:flex;position:fixed;inset:0;z-index:9998;background:rgba(13,78,138,.85);align-items:center;justify-content:center;color:#fff;font-size:18px;font-family:'Segoe UI',Arial,sans-serif}
</style>

<script>
const SHEETS_URL_DASH = 'https://script.google.com/macros/s/AKfycbw9hKu9e5IlpCF1A_CjLM4qavd7s0sS281KyEDdersJ-42vyDRZddRL9F8OQrfXJk1MSA/exec';
const STORAGE_KEY = 'biolead-v3';
let ALL = [], filtrado = [], sortCol = 'nome', sortDir = 1, pag = 1, POR_PAG = 25;
let cE = null; let cEstados = null;

function mapearStatus(s) {
  if (!s || s === 'Novo') return 'nc';
  if (s === 'Aguardando') return 'aguardando';
  if (s === 'Respondeu â€” Pediu informaĂ§Ăµes') return 'respondeu';
  if (s === 'Respondeu â€” Pediu orĂ§amento') return 'orcamento';
  if (s === 'Respondeu â€” Sem interesse') return 'sem';
  if (s === 'Respondeu â€” Sem projeto no momento') return 'sem';
  if (s === 'Respondeu â€” Sem retorno apĂłs interesse') return 'nr';
  if (s === 'Respondeu â€” Solicitou contato futuro') return 'respondeu';
  if (s === 'ReuniĂŁo agendada') return 'reuniao';
  if (s === 'ReuniĂŁo realizada') return 'reuniaoreal';
  if (s === 'ReuniĂŁo cancelada') return 'reuniaocanc';
  if (s === 'Convertido') return 'reuniaoreal';
  if (s === 'Desqualificado') return 'desq';
  return 'nr';
}

function detectStatus(d) {
  if (d.desqualificado) return 'desq';
  const s = d.status || 'Novo';
  if (s === 'ReuniĂŁo realizada' || s === 'Convertido') return 'reuniaoreal';
  if (s === 'ReuniĂŁo cancelada') return 'reuniaocanc';
  if (s === 'ReuniĂŁo agendada') return 'reuniao';
  if (s === 'Respondeu â€” Pediu orĂ§amento') return 'orcamento';
  if (s === 'Respondeu â€” Sem interesse' || s === 'Respondeu â€” Sem projeto no momento') return 'sem';
  if (s === 'Respondeu â€” Sem retorno apĂłs interesse') return 'nr';
  if (s === 'Respondeu â€” Pediu informaĂ§Ăµes' || s === 'Respondeu â€” Solicitou contato futuro') return 'respondeu';
  if (s === 'Aguardando') return 'aguardando';
  if (s === 'Inativo') return 'inativo';
  if (s === 'Novo') return 'nc';
  return 'nr';
}

function parseDataDash(str) {
  if (!str) return null;
  // ISO format: 2026-03-31T03:00:00.000Z
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return new Date(str);
  // DD/MM/YYYY format
  const m = str.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
  return m ? new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1])) : null;
}

function carregarDados() {
  return window._dashDados || [];
}

function init() {
  document.getElementById('dash-dt').textContent = 'Atualizado em ' + new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});

  const DADOS = carregarDados().map(p => ({
    ...p,
    nome: String(p.nome||''), email: String(p.email||''),
    linha: String(p.linha||''), inst: String(p.inst||''),
    estado: String(p.estado||''), score: String(p.score||''),
    status: String(p.status||'Novo'),
    c1_raw: String(p.c1_raw||''), c2_raw: String(p.c2_raw||''),
    c3_raw: String(p.c3_raw||''), c1_nota: String(p.c1_nota||''),
    c2_nota: String(p.c2_nota||''), c3_nota: String(p.c3_nota||''),
    desqualificado: p.desqualificado === true || p.desqualificado === 'true',
  }));

  ALL.length = 0;
  DADOS.map(d => ({...d, sc: detectStatus(d)})).forEach(d => ALL.push(d));
  filtrado = [...ALL];

  updateMetrics();
  updateCharts();

  document.getElementById('dash-content').style.display = '';
}

function updateMetrics() {
  const t = filtrado.length;
  const desq = filtrado.filter(d => d.desqualificado).length;
  const ativos = filtrado.filter(d => !d.desqualificado);
  const ta = ativos.length;
  const alto = ativos.filter(d => d.score === 'ALTO').length;
  const STATUS_RESPONDEU = ['Respondeu â€” Pediu informaĂ§Ăµes','Respondeu â€” Pediu orĂ§amento','Respondeu â€” Solicitou contato futuro','Respondeu â€” Sem interesse','Respondeu â€” Sem projeto no momento','Respondeu â€” Sem retorno apĂłs interesse','ReuniĂŁo agendada','ReuniĂŁo realizada','ReuniĂŁo cancelada','Convertido'];
  const resp = ativos.filter(d => STATUS_RESPONDEU.includes(d.status||'')).length;
  const reunAgend = ativos.filter(function(d){ return d.status === 'ReuniĂŁo agendada'; }).length;
  const reunReal = ativos.filter(d => d.sc === 'reuniaoreal').length;
  const reunCanc = ativos.filter(function(d){ return d.status === 'ReuniĂŁo cancelada'; }).length;
  const orc = ativos.filter(d => d.sc === 'orcamento').length;
  const conv = ativos.filter(d => d.status === 'Convertido').length;
  const taxaResp = ta ? Math.round(resp/ta*100) : 0;

  document.getElementById('mbox').innerHTML = [
    {cls:'', icon:'ti-users', label:'Total', val:t, sub:ta+' ativos'},
    {cls:'', icon:'ti-star', label:'Score alto', val:alto, sub:(ta?Math.round(alto/ta*100):0)+'% dos ativos'},
    {cls:'teal', icon:'ti-mail-check', label:'Responderam', val:resp, sub:taxaResp+'% dos ativos'},
    {cls:'amber', icon:'ti-calendar-event', label:'Reun. agendadas', val:reunAgend, sub:'aguardando realizaĂ§ĂŁo'},
    {cls:'green', icon:'ti-calendar-check', label:'Reun. realizadas', val:reunReal, sub:reunReal+' de '+reunAgend+' agendadas'},
    {cls:'red', icon:'ti-calendar-x', label:'Reun. canceladas', val:reunCanc, sub:'reagendamento pendente'},
    {cls:'green', icon:'ti-file-invoice', label:'OrĂ§amentos', val:orc, sub:'solicitados'},
    {cls:'purple', icon:'ti-trophy', label:'Convertidos', val:conv, sub:'clientes confirmados'},
    {cls:'red', icon:'ti-ban', label:'Desqualificados', val:desq, sub:'fora do perfil'},
  ].map(function(m) { return '<div class="mc '+m.cls+'"><div class="mc-label"><i class="ti '+m.icon+'" style="font-size:12px" aria-hidden="true"></i> '+m.label+'</div><div class="mc-val">'+m.val+'</div><div class="mc-sub">'+m.sub+'</div></div>'; }).join('');

  // Funil
  // Sankey de engajamento
  const STATUS_RESP_ALL = ['Respondeu â€” Pediu informaĂ§Ăµes','Respondeu â€” Pediu orĂ§amento','Respondeu â€” Solicitou contato futuro','Respondeu â€” Sem interesse','Respondeu â€” Sem projeto no momento','Respondeu â€” Sem retorno apĂłs interesse','ReuniĂŁo agendada','ReuniĂŁo realizada','ReuniĂŁo cancelada','Convertido'];
  const nCadastrados = filtrado.length;
  const nContatados = ativos.filter(function(d){ return d.c1_raw && d.c1_raw.trim(); }).length;
  const nResponderam = ativos.filter(function(d){ return STATUS_RESP_ALL.includes(d.status||''); }).length;
  const nReuniaoAgend = ativos.filter(function(d){ return ['ReuniĂŁo agendada','ReuniĂŁo realizada','ReuniĂŁo cancelada'].includes(d.status||''); }).length;
  const nReuniaoReal = ativos.filter(function(d){ return d.status === 'ReuniĂŁo realizada'; }).length;
  const nReuniaoCanc = ativos.filter(function(d){ return d.status === 'ReuniĂŁo cancelada'; }).length;
  const nOrcamento = ativos.filter(function(d){ return d.sc === 'orcamento' || d.status === 'Respondeu â€” Pediu orĂ§amento'; }).length;
  const nSemInteresse = ativos.filter(function(d){ return ['Respondeu â€” Sem interesse','Respondeu â€” Sem projeto no momento'].includes(d.status||''); }).length;
  const nSemRetorno = Math.max(0, nContatados - nResponderam);
  const nNaoContat = Math.max(0, nCadastrados - nContatados - desq);

  function sankeyPct(n, of) { return of > 0 ? Math.round(n/of*100) : 0; }

  // Use sqrt scale to soften extremes
  function sqrtH(n, maxN, maxH) {
    return Math.max(Math.round(Math.sqrt(n / maxN) * maxH), 6);
  }

  var W = 960, H = 360, nodeW = 12;
  var col = [30, 220, 420, 620, 800];
  var maxH = 240;
  var maxN = nCadastrados;

  var hCad  = sqrtH(nCadastrados, maxN, maxH);
  var hCont = sqrtH(nContatados,  maxN, maxH);
  var hResp = sqrtH(nResponderam, maxN, maxH);
  var hReu  = sqrtH(nReuniaoAgend, maxN, maxH);
  var hReuReal = sqrtH(nReuniaoReal, maxN, maxH);
  var hReuCanc = sqrtH(nReuniaoCanc, maxN, maxH);
  var hOrc  = sqrtH(nOrcamento,   maxN, maxH);
  var hSem  = sqrtH(nSemInteresse,maxN, maxH);
  // sem retorno and nao contatado: even smaller (cube root)
  var hSemRet  = nSemRetorno  > 0 ? Math.max(Math.round(Math.cbrt(nSemRetorno /maxN)*maxH*0.5), 4) : 0;
  var hNaoCont = nNaoContat   > 0 ? Math.max(Math.round(Math.cbrt(nNaoContat  /maxN)*maxH*0.5), 4) : 0;

  // Y positions â€” center main nodes
  var centerY = H / 2;
  var yCad  = centerY - hCad/2;
  var yCont = centerY - hCont/2;
  var yResp = centerY - hResp/2;

  // Results: stack from center
  var totalResults = hReu + hOrc + hSem + (nReuniaoAgend>0?8:0) + (nOrcamento>0?8:0);
  var yReu  = centerY - totalResults/2;
  var yReuReal = centerY - (hReuReal + (nReuniaoCanc>0?hReuCanc+8:0))/2;
  var yReuCanc = yReuReal + hReuReal + 8;
  var yOrc  = yReu + hReu + 8;
  var ySem  = yOrc + hOrc + 8;

  // Gray nodes below
  var yNaoCont = yCad  + hCad  + 16;
  var ySemRet  = yCont + hCont + 16;

  function mkFlow(x1,y1,h1,x2,y2,h2,color,alpha) {
    alpha = alpha || 0.55;
    var mx = (x1+x2)/2;
    return '<path d="M'+(x1+nodeW)+' '+y1+' C'+mx+' '+y1+','+mx+' '+y2+','+x2+' '+y2
      +' L'+x2+' '+(y2+h2)+' C'+mx+' '+(y2+h2)+','+mx+' '+(y1+h1)+','+(x1+nodeW)+' '+(y1+h1)+' Z"'
      +' fill="'+color+'" opacity="'+alpha+'"/>';
  }

  function mkNode(x,y,h,color,label,val,pctTxt) {
    var tx = x + nodeW + 10;
    var midY = y + h/2;
    return '<rect x="'+x+'" y="'+y+'" width="'+nodeW+'" height="'+h+'" rx="4" fill="'+color+'"/>'
      +'<text x="'+tx+'" y="'+(midY-7)+'" font-size="14" font-weight="700" fill="'+color+'" font-family="Segoe UI,sans-serif">'+val+'</text>'
      +'<text x="'+tx+'" y="'+(midY+9)+'" font-size="11" fill="#64748b" font-family="Segoe UI,sans-serif">'+label+(pctTxt?' Â· '+pctTxt:'')+'</text>';
  }

  function mkGrayLabel(x,y,h,txt) {
    return '<text x="'+(x+nodeW+8)+'" y="'+(y+h/2+4)+'" font-size="10" fill="#b0bec5" font-family="Segoe UI,sans-serif">'+txt+'</text>';
  }

  var parts = ['<svg width="100%" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Fluxo de engajamento">'];

  // Main flows
  parts.push(mkFlow(col[0],yCad,hCad, col[1],yCont,hCont, '#1A73C8'));
  parts.push(mkFlow(col[1],yCont,hCont, col[2],yResp,hResp, '#2EC4A5'));
  if(nReuniaoAgend>0) parts.push(mkFlow(col[2],yResp,hReu, col[3],yReu,hReu, '#EF9F27'));
  if(nOrcamento>0)    parts.push(mkFlow(col[2],yResp+hReu,hOrc, col[3],yOrc,hOrc, '#7F77DD'));
  if(nSemInteresse>0) parts.push(mkFlow(col[2],yResp+hReu+hOrc,hSem, col[3],ySem,hSem, '#E24B4A', 0.3));
  // ReuniĂŁo â†’ realizada / cancelada
  if(nReuniaoReal>0) parts.push(mkFlow(col[3],yReu,hReuReal, col[4],yReuReal,hReuReal, '#27a85a'));
  if(nReuniaoCanc>0) parts.push(mkFlow(col[3],yReu+hReuReal,hReuCanc, col[4],yReuCanc,hReuCanc, '#E24B4A', 0.4));

  // Gray flows (discrete)
  if(nNaoContat>0)  parts.push(mkFlow(col[0],yCad+hCad+4,hNaoCont, col[1],ySemRet+hSemRet+4,hNaoCont, '#b0bec5', 0.25));
  if(nSemRetorno>0) parts.push(mkFlow(col[1],yCont+hCont+4,hSemRet, col[2],yResp+hResp+4,hSemRet, '#b0bec5', 0.2));

  // Nodes
  parts.push(mkNode(col[0],yCad,hCad,'#1A73C8','cadastrados',nCadastrados,''));
  parts.push(mkNode(col[1],yCont,hCont,'#2EC4A5','contatados',nContatados,sankeyPct(nContatados,nCadastrados)+'%'));
  parts.push(mkNode(col[2],yResp,hResp,'#EF9F27','responderam',nResponderam,sankeyPct(nResponderam,nContatados)+'%'));
  if(nReuniaoAgend>0) parts.push(mkNode(col[3],yReu,hReu,'#EF9F27','reuniĂµes',nReuniaoAgend,sankeyPct(nReuniaoAgend,nResponderam)+'%'));
  if(nOrcamento>0)    parts.push(mkNode(col[3],yOrc,hOrc,'#7F77DD','orĂ§amentos',nOrcamento,sankeyPct(nOrcamento,nResponderam)+'%'));
  if(nSemInteresse>0) parts.push(mkNode(col[3],ySem,hSem,'#E24B4A','s/ interesse',nSemInteresse,sankeyPct(nSemInteresse,nResponderam)+'%'));
  if(nReuniaoReal>0) parts.push(mkNode(col[4],yReuReal,hReuReal,'#27a85a','realizadas',nReuniaoReal,sankeyPct(nReuniaoReal,nReuniaoAgend)+'%'));
  if(nReuniaoCanc>0) parts.push(mkNode(col[4],yReuCanc,hReuCanc,'#E24B4A','canceladas',nReuniaoCanc,sankeyPct(nReuniaoCanc,nReuniaoAgend)+'%'));

  // Gray labels
  if(nNaoContat>0)  parts.push(mkGrayLabel(col[1],ySemRet+hSemRet+4,hNaoCont,nNaoContat+' s/ contato'));
  if(nSemRetorno>0) parts.push(mkGrayLabel(col[2],yResp+hResp+4,hSemRet,nSemRetorno+' s/ retorno'));

  parts.push('</svg>');
  document.getElementById('sankey-wrap').innerHTML = parts.join('');


  // Taxa de resposta
  const naoResp = ta - resp;
  document.getElementById('taxa-content').innerHTML =
    '<div style="display:flex;align-items:center;gap:20px;padding:8px 0">' +
    '<div><div class="taxa-pct">' + taxaResp + '%</div>' +
    '<div style="font-size:12px;color:var(--text3);margin-top:4px">taxa de resposta</div></div>' +
    '<div style="flex:1">' +
    '<div style="display:flex;height:12px;border-radius:20px;overflow:hidden;margin-bottom:10px">' +
    '<div style="width:' + taxaResp + '%;background:var(--bm-teal)"></div>' +
    '<div style="flex:1;background:#EAF4FA"></div></div>' +
    '<div style="font-size:12px;color:var(--text2);line-height:2">' +
    '<span style="color:var(--bm-teal);font-weight:600">' + resp + '</span> pesquisadores responderam<br>' +
    '<span style="color:var(--text3);font-weight:600">' + naoResp + '</span> ainda sem resposta<br>' +
    '<span style="color:#27a85a;font-weight:600">' + conv + '</span> convertidos em clientes' +
    '</div></div></div>';

  // Tempo mĂ©dio entre contatos
  let somaC1C2 = 0, contC1C2 = 0, somaC2C3 = 0, contC2C3 = 0;
  ativos.forEach(d => {
    const d1 = parseDataDash(d.c1_raw), d2 = parseDataDash(d.c2_raw), d3 = parseDataDash(d.c3_raw);
    if (d1 && d2) { somaC1C2 += (d2-d1)/(1000*60*60*24); contC1C2++; }
    if (d2 && d3) { somaC2C3 += (d3-d2)/(1000*60*60*24); contC2C3++; }
  });
  document.getElementById('tempo-content').innerHTML =
    '<div class="tempo-item"><div class="tempo-label">1Âş â†’ 2Âş contato</div>' +
    '<div class="tempo-val">' + (contC1C2 ? Math.round(somaC1C2/contC1C2) : 'â€”') +
    ' <span style="font-size:11px;font-weight:400;color:var(--text3)">dias em mĂ©dia</span></div></div>' +
    '<div class="tempo-item"><div class="tempo-label">2Âş â†’ 3Âş contato</div>' +
    '<div class="tempo-val">' + (contC2C3 ? Math.round(somaC2C3/contC2C3) : 'â€”') +
    ' <span style="font-size:11px;font-weight:400;color:var(--text3)">dias em mĂ©dia</span></div></div>' +
    '<div class="tempo-item"><div class="tempo-label">Pesquisadores c/ 2+ contatos</div>' +
    '<div class="tempo-val">' + contC1C2 + ' <span style="font-size:11px;font-weight:400;color:var(--text3)">de ' + ta + '</span></div></div>';

  // DistribuiĂ§ĂŁo por estado - grĂˇfico de barras
  const byEstado = {};
  filtrado.forEach(d => { if (d.estado) byEstado[d.estado] = (byEstado[d.estado]||0)+1; });
  const estadosSorted = Object.entries(byEstado).sort((a,b) => b[1]-a[1]);
  if (cEstados) { try { cEstados.destroy(); } catch(e) {} cEstados = null; }
  cEstados = new Chart(document.getElementById('cEstados'), {
    type: 'bar',
    data: {
      labels: estadosSorted.map(([e]) => e),
      datasets: [{
        label: 'Pesquisadores',
        data: estadosSorted.map(([,n]) => n),
        backgroundColor: estadosSorted.map((_,i) => { const t = estadosSorted.length > 1 ? i/(estadosSorted.length-1) : 0; return gradC(t, 0.82); }),
        hoverBackgroundColor: estadosSorted.map((_,i) => { const t = estadosSorted.length > 1 ? i/(estadosSorted.length-1) : 0; return gradC(t, 1); }),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { grid: { display: false } } }
    }
  });
}

function updateCharts() {
  // EvoluĂ§ĂŁo temporal - contatos por mĂŞs (usando c1_raw como data do 1Âş contato)
  const meses = {};
  ALL.forEach(d => {
    const dt = parseDataDash(d.c1_raw);
    if (!dt) return;
    const key = dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0');
    meses[key] = (meses[key]||0) + 1;
  });
  const labels = Object.keys(meses).sort().slice(-12);
  const values = labels.map(k => meses[k]);

  if (cE) cE.destroy();
  cE = new Chart(document.getElementById('cE'), {
    type: 'bar',
    data: {
      labels: labels.map(k => { const [y,m] = k.split('/'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(m)-1]+'/'+y.slice(2); }),
      datasets: [{
        label: 'Novos contatos',
        data: values,
        backgroundColor: 'rgba(26,115,200,0.7)',
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { grid: { display: false } } }
    }
  });
}

function gradC(t,alpha){
  t=Math.max(0,Math.min(1,t));
  var stops=[[0,[6,92,169]],[0.2,[20,132,198]],[0.4,[24,148,210]],[0.6,[37,162,190]],[0.8,[45,173,174]],[1,[57,186,155]]];
  for(var i=0;i<stops.length-1;i++){
    if(t>=stops[i][0]&&t<=stops[i+1][0]){
      var r=(t-stops[i][0])/(stops[i+1][0]-stops[i][0]);
      var lerp=function(a,b){return Math.round(a+(b-a)*r);};
      var c0=stops[i][1],c1=stops[i+1][1];
      if(alpha>=1)return '#'+lerp(c0[0],c1[0]).toString(16).padStart(2,'0')+lerp(c0[1],c1[1]).toString(16).padStart(2,'0')+lerp(c0[2],c1[2]).toString(16).padStart(2,'0');
      return 'rgba('+lerp(c0[0],c1[0])+','+lerp(c0[1],c1[1])+','+lerp(c0[2],c1[2])+','+alpha+')';
    }
  }
}

function carregarEIniciar() {
  document.getElementById('loading-overlay').style.display = 'flex';
  const cbName = '_dashBlCb';
  window[cbName] = function(res) {
    document.getElementById('loading-overlay').style.display = 'none';
    if (res.ok) {
      window._dashDados = res.dados.map(p => ({
        ...p,
        nome: String(p.nome||''), email: String(p.email||''),
        linha: String(p.linha||''), inst: String(p.inst||''),
        estado: String(p.estado||''), score: String(p.score||''),
        status: String(p.status||'Novo'),
        c1_raw: String(p.c1_raw||''), c2_raw: String(p.c2_raw||''),
        c3_raw: String(p.c3_raw||''), c1_nota: String(p.c1_nota||''),
        c2_nota: String(p.c2_nota||''), c3_nota: String(p.c3_nota||''),
        desqualificado: p.desqualificado === true || p.desqualificado === 'true',
        desq_motivo: String(p.desq_motivo||''),
      }));
      init();
    } else {
      alert('Erro ao carregar dados: ' + (res.error||'desconhecido'));
    }
  };
  const script = document.createElement('script');
  script.src = SHEETS_URL_DASH + '?action=biolead&sub=listar&params=%7B%7D&callback=' + cbName + '&t=' + Date.now();
  script.onerror = () => { document.getElementById('loading-overlay').style.display = 'none'; alert('Erro ao carregar dados.'); };
  document.head.appendChild(script);
}

carregarEIniciar();
</script>
