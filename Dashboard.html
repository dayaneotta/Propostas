<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bm-blue:#0D4E8A;--bm-mid:#1A73C8;--bm-teal:#2EC4A5;--bm-light:#E6F1FB;
  --surface:#fff;--bg:#F4F7FB;--border:rgba(13,78,138,.13);
  --text:#1a2a3a;--text2:#4a6070;--text3:#8aa0b0;
  --r:10px;--r-sm:6px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.nav{display:flex;align-items:center;gap:2px;background:#EEF3F8;border-bottom:1px solid #dce6f0;padding:6px 16px}
.nav span{font-size:9px;font-weight:700;letter-spacing:.08em;color:#8aa0b0;text-transform:uppercase;margin-right:10px;padding-right:10px;border-right:1px solid #dce6f0}
.nav a{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;color:#5a7080;text-decoration:none;letter-spacing:.02em}
.nav a:hover{background:rgba(26,115,200,0.08);color:#1A73C8}
.page{padding:10px 12px;max-width:1400px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:18px;font-weight:600;color:var(--bm-blue)}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.loading{text-align:center;padding:60px;color:var(--text3);font-size:15px}

/* Metric cards */
.metrics-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr)) 12px repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;align-items:stretch}
.mc-divider{width:1px;background:var(--border);align-self:stretch;margin:4px 0}
.mc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px 10px 10px 14px;min-width:0;overflow:hidden;position:relative}
.mc-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0}
.mc-label{font-size:11px;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.mc-label i{font-size:13px;color:var(--text3)}
.mc-val{font-size:24px;font-weight:500;color:var(--text);line-height:1;margin-bottom:6px}
.mc-sub{font-size:10px;color:var(--text3);white-space:normal;line-height:1.4}
.mc.teal .mc-accent{background:var(--bm-teal)}.mc.teal .mc-val{color:var(--bm-teal)}
.mc.green .mc-accent{background:#27a85a}.mc.green .mc-val{color:#27a85a}
.mc.amber .mc-accent{background:#d97706}.mc.amber .mc-val{color:#d97706}
.mc.red .mc-accent{background:#dc2626}.mc.red .mc-val{color:#dc2626}
.mc.purple .mc-accent{background:#7c3aed}.mc.purple .mc-val{color:#7c3aed}
.mc.blue .mc-accent{background:var(--bm-blue)}.mc.blue .mc-val{color:var(--bm-blue)}
.mc.default .mc-accent{background:var(--bm-blue)}

/* Charts grid */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-title i{font-size:15px;color:var(--bm-mid)}
.chart-wrap{position:relative;height:220px}

/* Funil */
.funil-row{display:grid;grid-template-columns:160px 1fr 50px 70px;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid rgba(13,78,138,.08)}
.funil-row:last-child{border-bottom:none}
.funil-label{font-size:12px;font-weight:600;color:var(--text)}
.funil-sub{font-size:10px;color:var(--text3);margin-top:1px}
.funil-bar-bg{background:#EAF4FA;border-radius:20px;height:10px;overflow:hidden}
.funil-bar{height:100%;border-radius:20px;transition:width .5s}
.funil-n{font-size:18px;font-weight:700;text-align:right}
.funil-pct{font-size:10px;color:var(--text3);text-align:right}

/* Mapa por estado */


/* Taxa de resposta */
.taxa-wrap{display:flex;align-items:center;gap:16px}
.taxa-circle{position:relative;width:100px;height:100px}
.taxa-text{font-size:13px;color:var(--text2);line-height:1.6}
.taxa-pct{font-size:28px;font-weight:700;color:var(--bm-teal)}

/* Tempo médio */
.tempo-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.tempo-item:last-child{border-bottom:none}
.tempo-label{font-size:12px;color:var(--text2)}
.tempo-val{font-size:16px;font-weight:700;color:var(--bm-blue)}

#loading-overlay{display:flex;position:fixed;inset:0;z-index:9998;background:rgba(13,78,138,.85);align-items:center;justify-content:center;color:#fff;font-size:18px;font-family:'Segoe UI',Arial,sans-serif}

/* Header */
.site-header{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#0D4E8A 0%,#1A73C8 55%,#2EC4A5 100%);padding:10px 20px;margin-bottom:0}
.site-header img{height:52px;background:#fff;border-radius:8px;padding:4px 8px}
.site-header-divider{width:1px;height:36px;background:rgba(255,255,255,0.3)}
.site-header-title{font-size:15px;font-style:italic;color:rgba(255,255,255,0.9);font-family:'Segoe UI',Arial,sans-serif;font-weight:400;letter-spacing:.02em}

/* ── FILTRO DE PERÍODO ── */
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar-label{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-right:4px}
.filter-chip{border:.5px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;background:var(--surface);transition:all .15s}
.filter-chip:hover{background:var(--bm-light);color:var(--bm-mid);border-color:var(--bm-mid)}
.filter-chip.active{background:var(--bm-blue);color:#fff;border-color:var(--bm-blue)}
/* ── ALERTA: SEM CONTATO ── */
.sem-contato-box{background:linear-gradient(135deg,#fff5f5 0%,#fff 100%);border:.5px solid rgba(220,38,38,.25);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.sem-contato-num{font-size:38px;font-weight:700;color:#dc2626;line-height:1;min-width:52px;text-align:center}
.sem-contato-info{flex:1}
.sem-contato-titulo{font-size:13px;font-weight:700;color:#7f1d1d;margin-bottom:3px}
.sem-contato-sub{font-size:11px;color:#991b1b;line-height:1.5}
.sem-contato-btn{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap}
.sem-contato-btn:hover{background:#b91c1c}
/* ── KPIs DE CONVERSÃO ── */
.conv-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px;padding-top:14px;border-top:.5px solid var(--border)}
.ckpi{text-align:center}
.ckpi-val{font-size:18px;font-weight:700}
.ckpi-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;line-height:1.3}
.ckpi-bar{height:4px;border-radius:2px;background:#EAF4FA;margin-top:5px;overflow:hidden}
.ckpi-fill{height:100%;border-radius:2px}
/* ── DELTA NOS CARDS ── */
.mc-delta{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;margin-top:3px}
.mc-delta.up{background:#dcfce7;color:#166534}
.mc-delta.down{background:#fee2e2;color:#991b1b}
.mc-delta.neutral{background:#f1f5f9;color:#64748b}

.reun-estados-titulo{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:12px 0 8px}
.reun-estados-chips{display:flex;flex-wrap:wrap;gap:6px}
.reun-chip{display:inline-flex;align-items:center;background:var(--bg);border:.5px solid var(--border);border-radius:20px;padding:4px 10px;gap:8px}
.reun-chip-estado{font-size:12px;font-weight:500;color:var(--text)}
.reun-chip-num{font-size:13px;font-weight:500;color:var(--text)}

/* Taxa por instituição */
.inst-chart-wrap{position:relative;height:220px}
.tm-taxa{font-size:13px;font-weight:500;margin-top:2px}
.tm-leads{font-size:10px;margin-top:1px;opacity:.75}
</style>
</head>

<script>
const SHEETS_URL_DASH = 'https://script.google.com/macros/s/AKfycbw9hKu9e5IlpCF1A_CjLM4qavd7s0sS281KyEDdersJ-42vyDRZddRL9F8OQrfXJk1MSA/exec';
const STORAGE_KEY = 'biolead-v3';
let ALL = [], filtrado = [], sortCol = 'nome', sortDir = 1, pag = 1, POR_PAG = 25;
let cE = null; let cEstados = null;

function mapearStatus(s) {
  if (!s || s === 'Novo') return 'nc';
  if (s === 'Aguardando') return 'aguardando';
  if (s === 'Respondeu — Pediu informações') return 'respondeu';
  if (s === 'Respondeu — Pediu orçamento') return 'orcamento';
  if (s === 'Respondeu — Sem interesse') return 'sem';
  if (s === 'Respondeu — Sem projeto no momento') return 'sem';
  if (s === 'Respondeu — Sem retorno após interesse') return 'nr';
  if (s === 'Respondeu — Solicitou contato futuro') return 'respondeu';
  if (s === 'Reunião agendada') return 'reuniao';
  if (s === 'Reunião realizada') return 'reuniaoreal';
  if (s === 'Reunião cancelada') return 'reuniaocanc';
  if (s === 'Convertido') return 'reuniaoreal';
  if (s === 'Desqualificado') return 'desq';
  return 'nr';
}

function detectStatus(d) {
  if (d.desqualificado) return 'desq';
  const s = d.status || 'Novo';
  if (s === 'Reunião realizada' || s === 'Convertido') return 'reuniaoreal';
  if (s === 'Reunião cancelada') return 'reuniaocanc';
  if (s === 'Reunião agendada') return 'reuniao';
  if (s === 'Respondeu — Pediu orçamento') return 'orcamento';
  if (s === 'Respondeu — Sem interesse' || s === 'Respondeu — Sem projeto no momento') return 'sem';
  if (s === 'Respondeu — Sem retorno após interesse') return 'nr';
  if (s === 'Respondeu — Pediu informações' || s === 'Respondeu — Solicitou contato futuro') return 'respondeu';
  if (s === 'Aguardando') return 'aguardando';
  if (s === 'Inativo') return 'inativo';
  if (s === 'Novo') return 'nc';
  return 'nr';
}

function parseDataDash(str) {
  if (!str) return null;
  // ISO format: 2026-03-31T03:00:00.000Z
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return new Date(str);
  // DD/MM/YYYY format
  const m = str.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
  return m ? new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1])) : null;
}

function carregarDados() {
  return window._dashDados || [];
}

let filtroDias = 0;

function setFiltro(dias, btn) {
  filtroDias = dias;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  aplicarFiltro();
}

function aplicarFiltro() {
  if (filtroDias === 0) {
    filtrado = [...ALL];
  } else {
    const limite = new Date();
    limite.setDate(limite.getDate() - filtroDias);
    filtrado = ALL.filter(d => {
      const dt = parseDataDash(d.c1_raw);
      return !dt || dt >= limite;
    });
  }
  updateMetrics();
  updateCharts();
}

function init() {
  document.getElementById('dash-dt').textContent = 'Atualizado em ' + new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});

  const DADOS = carregarDados().map(p => ({
    ...p,
    nome: String(p.nome||''), email: String(p.email||''),
    linha: String(p.linha||''), inst: String(p.inst||''),
    estado: String(p.estado||''), score: String(p.score||''),
    status: String(p.status||'Novo'),
    c1_raw: String(p.c1_raw||''), c2_raw: String(p.c2_raw||''),
    c3_raw: String(p.c3_raw||''), c1_nota: String(p.c1_nota||''),
    c2_nota: String(p.c2_nota||''), c3_nota: String(p.c3_nota||''),
    desqualificado: p.desqualificado === true || p.desqualificado === 'true',
  }));

  ALL.length = 0;
  DADOS.map(d => ({...d, sc: detectStatus(d)})).forEach(d => ALL.push(d));
  filtrado = [...ALL];

  aplicarFiltro();

  document.getElementById('dash-content').style.display = '';
}

function contatoValido(v){
  if (!v) return false;
  var s = v.trim().replace(/^"+|"+$/g, '').trim(); // remove aspas escapadas do Google Sheets
  return s.length > 3 && !/^[-*_]{2,}$/.test(s);
}

function updateMetrics() {
  const t = filtrado.length;
  const desq = filtrado.filter(d => d.desqualificado).length;
  const ativos = filtrado.filter(d => !d.desqualificado);
  const ta = ativos.length;
  const alto = ativos.filter(d => d.score === 'ALTO').length;
  const STATUS_RESPONDEU = ['Respondeu — Pediu informações','Respondeu — Pediu orçamento','Respondeu — Solicitou contato futuro','Respondeu — Sem interesse','Respondeu — Sem projeto no momento','Respondeu — Sem retorno após interesse','Reunião agendada','Reunião realizada','Reunião cancelada','Convertido'];
  const resp = ativos.filter(d => STATUS_RESPONDEU.includes(d.status||'')).length;
  const reunAgend = ativos.filter(function(d){ return d.status === 'Reunião agendada'; }).length;
  const reunReal = ativos.filter(d => d.sc === 'reuniaoreal').length;
  const reunCanc = ativos.filter(function(d){ return d.status === 'Reunião cancelada'; }).length;
  // Orçamentos = pedidos diretos (status) + pedidos pós-reunião (notas/raw)
  const orcDireto = ativos.filter(function(d){ return d.sc === 'orcamento' || d.status === 'Respondeu — Pediu orçamento'; }).length;
  const orcPosReun = ativos.filter(function(d){
    if (d.sc === 'orcamento' || d.status === 'Respondeu — Pediu orçamento') return false;
    var textos = [d.c1_raw,d.c2_raw,d.c3_raw,d.c1_nota,d.c2_nota,d.c3_nota].join(' ').toLowerCase();
    return /or[cç]amento|proposta/.test(textos) && ['Reunião realizada','Reunião cancelada'].includes(d.status||'');
  }).length;
  const orc = orcDireto + orcPosReun;
  const conv = ativos.filter(d => d.status === 'Convertido').length;
  const taxaResp = ta ? Math.round(resp/ta*100) : 0;

  // ── Calcular período anterior para delta ──
  var agora = new Date();
  var periodoAnterior = filtrado.filter(function(d) {
    if (filtroDias === 0) return false;
    var dt = parseDataDash(d.c1_raw);
    if (!dt) return false;
    var limiteAtual = new Date(); limiteAtual.setDate(limiteAtual.getDate() - filtroDias);
    var limiteAnterior = new Date(); limiteAnterior.setDate(limiteAnterior.getDate() - filtroDias * 2);
    return dt >= limiteAnterior && dt < limiteAtual;
  });
  var tAnterior = periodoAnterior.length;
  var ativoAnterior = periodoAnterior.filter(function(d){ return !d.desqualificado; });
  var convAnterior = ativoAnterior.filter(function(d){ return d.status === 'Convertido'; }).length;
  var respAnterior = ativoAnterior.filter(function(d){ return STATUS_RESPONDEU.includes(d.status||''); }).length;
  var taxaRespAnterior = ativoAnterior.length ? Math.round(respAnterior/ativoAnterior.length*100) : 0;

  function deltaHtml(atual, anterior) {
    if (filtroDias === 0 || anterior === 0) return '';
    var diff = atual - anterior;

  // ── breakdown de Responderam — card HTML externo ──

  // Tempo médio entre contatos

  if (cEstados) { try { cEstados.destroy(); } catch(e) {} cEstados = null; }
  var refinedTicksE = { color: '#8aa0b0', font: { family: 'Segoe UI, Arial, sans-serif', size: 10 } };
  cEstados = new Chart(document.getElementById('cEstados'), {
    type: 'bar',
    data: {
      labels: estadosSorted.map(([e]) => e),

  // ── Chips de estados com reuniões realizadas + alto score ──
  var reunByEstado = {};

      reunByEstado[d.estado] = (reunByEstado[d.estado]||0) + 1;

  var chipsEl = document.getElementById('reun-estados-chips');

  var byInst = {};
  ativos.forEach(function(d) {

    function bmColorInst(taxa) {

        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(item) {
                var d = instList[item.dataIndex];
                return ['Taxa: '+d.taxa+'%', 'Leads: '+d.total];
              }
            }
          }
        },
        scales: {
          x: {
            min: 0, max: 100,
            grid: { color: 'rgba(13,78,138,0.05)', drawBorder: false },
            ticks: { ...refinedTicksI, callback: function(v){ return v+'%'; } },
            border: { display: false }
          },
          y: {
            grid: { display: false },
            ticks: refinedTicksI,
            border: { display: false }
          }
        }
      }
    });
  }

function updateCharts() {
  // Shared refined style
  var refinedTicks = { color: '#8aa0b0', font: { family: 'Segoe UI, Arial, sans-serif', size: 10 } };
  var refinedGrid = { color: 'rgba(13,78,138,0.06)', drawBorder: false };

  // Evolução temporal
  const meses = {};
  ALL.forEach(d => {
    const dt = parseDataDash(d.c1_raw);
    if (!dt) return;
    const key = dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0');
    meses[key] = (meses[key]||0) + 1;
  });
  const labels = Object.keys(meses).sort().slice(-12);
  const values = labels.map(k => meses[k]);

  // ── Tendência: comparar últimos 2 meses ──
  var sortedKeys = Object.keys(meses).sort();
  if (sortedKeys.length >= 2) {
    var last = meses[sortedKeys[sortedKeys.length-1]];
    var prev = meses[sortedKeys[sortedKeys.length-2]];
    var tBadge = document.getElementById('tendencia-badge');
    if (tBadge) {
      if (last > prev) {
        var pctUp = Math.round((last-prev)/prev*100);
        tBadge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#dcfce7;color:#166534">↑ '+pctUp+'% vs mês anterior</span>';
      } else if (last < prev) {
        var pctDn = Math.round((prev-last)/prev*100);
        tBadge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fee2e2;color:#991b1b">↓ '+pctDn+'% vs mês anterior</span>';
      } else {
        tBadge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#f1f5f9;color:#64748b">= mesmo volume</span>';
      }
    }
  }

  if (cE) cE.destroy();
  cE = new Chart(document.getElementById('cE'), {
    type: 'bar',
    data: {
      labels: labels.map(k => { const [y,m] = k.split('/'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(m)-1]+'/'+y.slice(2); }),
      datasets: [{
        label: 'Novos contatos',
        data: values,
        backgroundColor: function(ctx) {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 220);
          g.addColorStop(0, 'rgba(26,115,200,0.78)');
          g.addColorStop(1, 'rgba(46,196,165,0.55)');
          return g;
        },
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: refinedGrid, ticks: refinedTicks, border: { display: false } },
        x: { grid: { display: false }, ticks: refinedTicks, border: { display: false } }
      }
    }
  });

  // ── Stats abaixo do gráfico de evolução ──
  var allKeys = Object.keys(meses).sort();
  var totalContatos = allKeys.reduce(function(s,k){ return s + meses[k]; }, 0);
  var media = allKeys.length ? Math.round(totalContatos / allKeys.length) : 0;
  var melhorKey = allKeys.reduce(function(a,b){ return meses[a] >= meses[b] ? a : b; }, allKeys[0]);
  var melhorVal = melhorKey ? meses[melhorKey] : 0;
  var melhorLabel = melhorKey ? (['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(melhorKey.split('/')[1])-1]+'/'+melhorKey.split('/')[0].slice(2)) : '—';
  var mesesAtivos = allKeys.length;
  var statsEl = document.getElementById('evolucao-stats');
  if (statsEl) {
    var statStyle = 'flex:1;text-align:center;padding:0 8px;border-right:.5px solid var(--border)';
    var lastStatStyle = 'flex:1;text-align:center;padding:0 8px';
    var valStyle = 'font-size:18px;font-weight:500;color:';
    var lblStyle = 'font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em';
    var subStyle = 'font-size:10px;color:var(--text2);margin-top:1px';
    statsEl.innerHTML =
      '<div style="'+statStyle+'"><div style="'+valStyle+'#1A73C8">'+media+'</div><div style="'+lblStyle+'">Média / mês</div></div>'
      +'<div style="'+statStyle+'"><div style="'+valStyle+'#0B6E4F">'+melhorVal+'</div><div style="'+lblStyle+'">Melhor mês</div><div style="'+subStyle+'">'+melhorLabel+'</div></div>'
      +'<div style="'+lastStatStyle+'"><div style="'+valStyle+'#1A8A78">'+mesesAtivos+'</div><div style="'+lblStyle+'">Meses ativos</div></div>';
  }

}

function gradC(t,alpha){
  t=Math.max(0,Math.min(1,t));
  var stops=[[0,[6,92,169]],[0.2,[20,132,198]],[0.4,[24,148,210]],[0.6,[37,162,190]],[0.8,[45,173,174]],[1,[57,186,155]]];
  for(var i=0;i<stops.length-1;i++){
    if(t>=stops[i][0]&&t<=stops[i+1][0]){
      var r=(t-stops[i][0])/(stops[i+1][0]-stops[i][0]);
      var lerp=function(a,b){return Math.round(a+(b-a)*r);};
      var c0=stops[i][1],c1=stops[i+1][1];
      if(alpha>=1)return '#'+lerp(c0[0],c1[0]).toString(16).padStart(2,'0')+lerp(c0[1],c1[1]).toString(16).padStart(2,'0')+lerp(c0[2],c1[2]).toString(16).padStart(2,'0');
      return 'rgba('+lerp(c0[0],c1[0])+','+lerp(c0[1],c1[1])+','+lerp(c0[2],c1[2])+','+alpha+')';
    }
  }
}

function toggleSankeyExpandido() {
  window._sankeyExpandido = !window._sankeyExpandido;
  updateMetrics();
}

function carregarEIniciar() {
  document.getElementById('loading-overlay').style.display = 'flex';
  const cbName = '_dashBlCb';
  window[cbName] = function(res) {
    document.getElementById('loading-overlay').style.display = 'none';
    if (res.ok) {
      window._dashDados = res.dados.map(p => ({
        ...p,
        nome: String(p.nome||''), email: String(p.email||''),
        linha: String(p.linha||''), inst: String(p.inst||''),
        estado: String(p.estado||''), score: String(p.score||''),
        status: String(p.status||'Novo'),
        c1_raw: String(p.c1_raw||''), c2_raw: String(p.c2_raw||''),
        c3_raw: String(p.c3_raw||''), c1_nota: String(p.c1_nota||''),
        c2_nota: String(p.c2_nota||''), c3_nota: String(p.c3_nota||''),
        desqualificado: p.desqualificado === true || p.desqualificado === 'true',
        desq_motivo: String(p.desq_motivo||''),
      }));
      init();
    } else {
      alert('Erro ao carregar dados: ' + (res.error||'desconhecido'));
    }
  };
  const script = document.createElement('script');
  script.src = SHEETS_URL_DASH + '?action=biolead&sub=listar&params=%7B%7D&callback=' + cbName + '&t=' + Date.now();
  script.onerror = () => { document.getElementById('loading-overlay').style.display = 'none'; alert('Erro ao carregar dados.'); };
  document.head.appendChild(script);
}

carregarEIniciar();
</script>
